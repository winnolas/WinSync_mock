<body>
	<div id="app" class="bg-ocrx">
		<header class="main-header p-4">
			<button type="button" class="btn p-0 d-flex gap-2 align-items-center justify-content-center fw-semibold">
				<i class="uil uil-arrow-left fspx-25 lhpx-25 mpxt-2"></i> Back
			</button>
		</header>

		<div></div>

		<main class="main-content p-4 d-flex align-items-center start-screen">
			<form class="pw-verify" action="#">
				<img class="mb-5" src="img/logo-2.svg" alt="" width="75">
				<h2 class="mb-2 fw-bold">Check your email</h2>
				<p class="text-body-secondary mb-0">We've sent an email to <b>your***@mail.com</b></p>
				<p class="text-body-secondary mb-5">Enter the <b>6 digit</b> code mentioned in your email</p>

				<!-- <h3 class="mb-3 text-body-secondary">Enter Code</h3> -->
				<div class="form-floating mb-3">
					<input type="text" class="form-control form-control-lg bg-white flogin-top" id="floatingInput" placeholder="name@example.com">
					<label for="floatingInput">Enter Code</label>
				</div>
				<!--
				<div class="d-flex mb-3">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
					<input type="tel" maxlength="1" pattern="[0-9]" class="form-control">
				</div>
				-->
				<button type="button" class="btn btn-lg btn-ocrx-primary w-100 poppins mpxb-5 rounded-2 fw-semibold mb-2" onclick="location.href = 'password-reset.html';">Verify account</button>
				<p class="py-3 w-fitcontent mx-auto">Did not received the email? <a href="#" class="link-ocrx-primary fw-semibold text-decoration-none d-block">Resend email</a></p>
			</form>
		</main>

		<footer class="main-footer p-4 d-flex flex-row align-items-center justify-content-center">
			<span class="text-body-secondary fspx-12 lhpx-12">WinSync ©
				<script>document.write(new Date().getUTCFullYear());</script>
			</span>
		</footer>
	</div><!-- end #app -->
	
<script type="module" src="js/main.js"></script>
