		<main class="main-content mx-2 rounded">

					<div>

				</div>

				<div class="position-absolute d-flex flex-row gap-2" style="top:.8rem; right: .8rem;">

					<button type="button" class="btn btn-outline-ocrx-primary p-0 wpx-25 hpx-25 d-flex align-items-center justify-content-center position-relative" data-bs-toggle="dropdown" aria-expanded="false">
						<span class="material-symbols-rounded fspx-22 lhpx-22">more_vert</span>
					</button>
					<ul class="dropdown-menu p-0">
						<li>
							<a class="dropdown-item d-flex flex-row align-items-center gap-2 fspx-13 lhpx-13 fw-500 ppx-10">
								<span class="material-symbols-outlined fspx-18">print</span>
								<span>Print</span>
							</a>
						</li>
						<li><hr class="dropdown-divider m-0"></li>
						<li>
							<button class="dropdown-item d-flex flex-row align-items-center gap-2 fspx-13 lhpx-13 fw-500 ppx-10">

							</button>
						</li>
						<li><hr class="dropdown-divider m-0"></li>
						<li>
							<button class="dropdown-item d-flex flex-row align-items-center gap-2 fspx-13 lhpx-13 fw-500 ppx-10" data-bs-toggle="modal" data-bs-target="#delete-medication">

								<span>Delete</span>
							</button>
						</li>
					</ul>

			</div>

			<div class="card">
				<div class="p-3 fspx-13">
					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Medication</h4>
					<input type="text" id="text" class="form-control rounded-1 mb-3" aria-describedby="" placeholder="e.g. CYANOCABALAMIN">

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Dosage</h4>
					<input type="text" id="text" class="form-control rounded-1 mb-2" aria-describedby="" placeholder="e.g. 1000MG/ML 1ML">

					<div id="slide-content" class="fade-toggle hidden">
						<div class="alert alert-ocrx-light mpxb-10 fspx-14">
							<label for="dosage-slide" class="form-label">Sliding Content Title</label>
							<input type="range" class="form-range" min="0" max="10000" value="50" id="dosage-input">

							<div class="d-flex flex-row justify-content-between">
								<div class="text-ocrx-primary wpx-60">0</div>
								<output id="dosage-output" class="text-ocrx-dark fw-600">50</output>
								<div class="text-ocrx-primary wpx-60 text-end">10,000</div>
							</div>

							<div class="mt-2">
								<label for="sliding-textarea" class="form-label">Example textarea</label>
								<textarea class="form-control" id="sliding-textarea" rows="3"></textarea>
							</div>
						</div>
					</div>

					<div class="d-flex flex-row gap-1 align-items-center mb-3">
						<div class="form-check form-check-inline d-flex flex-row align-items-center gap-1">
							<input class="form-check-input hpx-18 wpx-18 mpxe-5 mpxt-n-1 toggle-visibility" type="checkbox" id="slideScale" value="option1" data-toggle-target="#slide-content">
							<label class="form-check-label" for="slideScale">Sliding Scale</label>
						</div>
					</div>

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Frequeny</h4>
					<input type="text" id="text" class="form-control rounded-1 mb-3" aria-describedby="" placeholder="e.g. Q MONTH">

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Route</h4>
					<input type="text" id="text" class="form-control rounded-1 mb-3" aria-describedby="" placeholder="e.g. IM">

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Status</h4>
					<select class="form-select mb-3" aria-label="Default select example">
						<option selected>Open this select menu</option>
						<option value="1">One</option>
						<option value="2">Two</option>
						<option value="3">Three</option>
					</select>

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">Start Date</h4>
					<input type="text" id="rangeInput" class="form-control rounded-1 mb-3" aria-describedby="" placeholder="">

					<h4 class="mb-2 fspx-14 fw-700 text-ocrx-dark">End Date</h4>
					<input type="text" id="secondInput" class="form-control rounded-1 mb-2" aria-describedby="" placeholder="">

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-500 text-ocrx-dark">Classification</h4>
					<textarea class="form-control auto-grow mb-4" rows="3"></textarea>
					
					<!--
					<input type="text" id="text" class="form-control rounded-1 mb-2" aria-describedby="" placeholder="Classification" disabled>
					<a href="https://www.drugs.com/drug-classes.html" target="_blank" class="btn btn-sm btn-primary fspx-11 lhpx-11 rounded-1 mb-3">Drug Classifications</a>
					-->

					<h4 class="mb-2 fspx-14 fw-500 text-ocrx-dark">Side Effects</h4>
					<input type="text" id="text" class="form-control rounded-1 mb-2" aria-describedby="" placeholder="">

					<hr class="my-4">

					<h4 class="mb-2 fspx-14 fw-500 text-ocrx-dark">High Risk Drug Indication/Comments</h4>
					<textarea class="form-control auto-grow" rows="3"></textarea>

				</div>
			</div>

		<footer class="main-footer">
			<div class="nav-footer">
				<!-- <button><span class="material-symbols-outlined" style="">print</span><span style="">Print</span></button> -->

				<button><span class="material-symbols-outlined" style="">note_add</span><span style="">Attach PDF</span></button>
				<button><span class="material-symbols-outlined" style="">add_photo_alternate</span><span style="">Attach Image</span></button>
				<button><span class="material-symbols-outlined" style="">document_scanner</span><span style="">Scan Medication</span></button>
				<button><span class="material-symbols-outlined" style="">check_circle</span><span style="">Save</span></button>
				<button><span class="material-symbols-outlined" style="">done_outline</span><span style="">Submit</span></button>
			</div>

	<!-- autosize textarea -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/autosize.js/4.0.2/autosize.min.js"></script>
	
	<script type="module" src="js/main.js"></script>

	<script>
		// 
		// Flatpckr
		// Date range picker using range plugin
		flatpickr("#rangeInput", {
			mode: "range",
			plugins: [new rangePlugin({ input: "#secondInput" })],
			dateFormat: "Y-m-d"
		});
	</script>
