	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="">

	<!-- favicon icon -->
	<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">

<body>
	<div id="app" class="bg-ocrx">
		<header class="main-header p-4"></header>
		
		<div></div>

		<main class="main-content p-4 d-flex align-items-center  start-screen">
			
			<form class="pw-verify">
				<img class="mb-5" src="img/logo-2.svg" alt="" width="75">
				<h1 class="h2 mb-2 fw-bold">You have been successfully signed out.</h1>
				<p class="mb-5 text-body-secondary fs-6">Thank you for using our app. If you were signed out by mistake, please click the button below to sign back in.</p>
				<button class="btn btn-lg btn-ocrx-primary w-100 py-2 fw-semibold">Sign back in</button>
			</form>
		</main>
		
		<footer class="main-footer p-4 d-flex flex-row align-items-center justify-content-center">
			<span class="text-body-secondary fspx-12 lhpx-12">WinSync ©
				<script>document.write(new Date().getUTCFullYear());</script>
			</span>
		</footer>
		
		<blazor-focus-on-navigate selector="h1"></blazor-focus-on-navigate>
	</div>
<script type="module" src="js/main.js"></script>
