<!doctype html>
<html lang="en">

<head>
	<title>Password Reset - WinSync</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="author" content="">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="">

	<!-- favicon icon -->
	<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="img/favicon/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="img/favicon/favicon-16x16.png">
	<link rel="manifest" href="img/favicon/site.webmanifest">

	<!-- google fonts preconnect -->
	<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

	<!-- main style -->
	<link rel="stylesheet" href="css/ocrx.min.css" />

</head>

<body>
	<div id="app" class="bg-ocrx">
		<header class="main-header p-4">
			<button type="button" class="btn p-0 d-flex gap-2 align-items-center justify-content-center fw-semibold">
				<i class="uil uil-arrow-left fspx-25 lhpx-25 mpxt-2"></i> Back
			</button>
		</header>

		<div></div>

		<main class="main-content p-4 d-flex align-items-center start-screen">
			<form class="form-signin">
				<img class="mb-5" src="img/logo-2.svg" alt="" width="75">
				<h1 class="h2 mb-2 fw-bold">Reset Password</h1>

				<div class="alert alert-danger fspx-14 alert-dismissible fade show" role="alert">
					<strong>Error</strong> Your email or password is incorrect.
					<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
				</div> 

				<div class="form-floating">
					<input type="password" class="form-control form-control-lg bg-white flogin-top" id="floatingInput" placeholder="name@example.com">
					<label for="floatingInput">Enter Passsword</label>
				</div>
				
				<div class="form-floating">
					<input type="password" class="form-control form-control-lg bg-white mb-3" id="floatingPassword" placeholder="Password">
					<label for="floatingPassword">Confirm Password</label>
				</div>
				
				<button class="btn btn-lg btn-ocrx-primary w-100 py-2 fw-semibold" type="button" onclick="location.href = 'carevisits.html';">Submit</button>
			
			</form>
		</main>

		<footer class="main-footer p-4 d-flex flex-row align-items-center justify-content-center">
			<span class="text-body-secondary fspx-12 lhpx-12">WinSync ©
				<script>document.write(new Date().getUTCFullYear());</script>
			</span>
		</footer>
	</div><!-- end #app -->
<script type="module" src="js/main.js"></script>
</body>

</html>
